name: Aiba Cloud Build Terminal
on:
  workflow_dispatch:
    inputs:
      session_password:
        description: 'SSH session password (required)'
        required: true
        type: string

jobs:
  build-terminal:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      CCACHE_DIR: ~/.cache/ccache
      DEBIAN_BRANCH: unified

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Allow passwordless sudo
        run: echo "runner ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/runner

      - name: Validate session password
        run: |
          PASSWORD="${{ inputs.session_password }}"
          if [[ -z "$PASSWORD" ]]; then
            echo "ERROR: No session password provided — aborting"
            exit 1
          fi
          if (( ${#PASSWORD} < 12 )); then
            echo "ERROR: Password must be at least 12 characters"
            exit 1
          fi
          echo "Password accepted"

      - name: Install build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential devscripts equivs fakeroot \
            git curl unzip patch rsync xz-utils \
            python3-venv python3-full python3-pip \
            tmux ccache pigz ca-certificates \
            gnupg lsb-release pkg-config dpkg-dev

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-unified
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure ccache limits
        run: |
          ccache -M 9G
          ccache -s

      - name: Set session password
        run: |
          echo "runner:${{ inputs.session_password }}" | sudo chpasswd
          echo "root:${{ inputs.session_password }}"   | sudo chpasswd
          echo "Session password set — share only with trusted users"

      - name: Launch detached tmux session
        run: |
          tmux -S /tmp/aiba.sock new-session -d -s aiba -x 220 -y 50
          tmux -S /tmp/aiba.sock send-keys -t aiba \
            "cd $GITHUB_WORKSPACE && echo 'Ready. Run: DEBIAN_BRANCH=unified ./build-3.sh'" Enter
          chmod 777 /tmp/aiba.sock

      - name: Launch SSH terminal (tmate)
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true
          limit-access-to-actor: true

      - name: Keep workflow alive and auto-upload build
        run: |
          echo "===================================================="
          echo "SSH session is live. Connect via the tmate link above."
          echo "Tmux session name: aiba"
          echo "Reattach with:     tmux -S /tmp/aiba.sock attach -t aiba"
          echo "===================================================="

          while true; do
            echo "[$(date '+%H:%M:%S')] Runner alive — uptime: $(uptime -p) — checking for .deb file..."

            ccache -s 2>/dev/null | grep -E 'Cache size|Hits|Misses' || true

            # Look for the finished .deb file
            DEB=$(find "$GITHUB_WORKSPACE" -maxdepth 2 \
                    -name 'ungoogled-chromium_*.deb' \
                    ! -name '*build-deps*' \
                    | head -n 1 || true)

            if [[ -n "$DEB" ]]; then
              echo "===================================================="
              echo "BUILD COMPLETE: $(basename "$DEB")"
              echo "Starting automatic upload to file.kiwi..."
              echo "===================================================="
              
              # Automatically accept the npm install prompt and upload the file
              npx -y @file-kiwi/node "$DEB"
              
              echo "===================================================="
              echo "Upload finished! Terminating VM safely."
              echo "===================================================="
              
              # Force the runner to shut down successfully
              exit 0
            fi

            # If not finished, wait exactly 1 minute (60 seconds) before checking again
            echo "Build still running. Waiting 1 minute..."
            sleep 60
          done
