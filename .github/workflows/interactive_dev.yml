name: Interactive Cloud Terminal

on:
  workflow_dispatch: # Allows you to manually trigger this workspace from the web UI

jobs:
  interactive-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Keeps the terminal alive for up to 6 full hours

    steps:
      - name: Checkout Aiba Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pre-install Build Prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts equivs git curl unzip patch python3-venv python3-full tmux ccache

      - name: Restore/Save 10GB Compiler Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Launch Live SSH Terminal Session
        uses: mxschmitt/action-tmate@v3
        with:
          # Forces the workflow to pause and hand the terminal over to you
          detached: false 
          # CRITICAL SAFETY: Locks the door so only your ED25519 authentication key can get in
          limit-access-to-actor: true
