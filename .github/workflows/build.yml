name: Aiba Cloud Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04 # Debian-based architecture
    timeout-minutes: 360  # Allows up to 6 hours for the Chromium compile

    steps:
      - name: 1. Maximize Cloud Storage (Critical)
        run: |
          # Deletes pre-installed cloud bloat to give your script enough room to build
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/hostedtoolcache /opt/ghc /usr/local/share/boost /usr/share/swift
          docker system prune -af || true
          df -h

      - name: 2. Create Swap Space (Memory Safety)
        run: |
          # Prevents the compiler from crashing due to running out of RAM
          sudo fallocate -l 10G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: 3. Checkout Code Repository
        uses: actions/checkout@v4

      - name: 4. Execute Your Custom Script
        run: |
    
          # Your exact build command
          chmod +x build_aiba_debian.sh
          ./build_aiba_debian.sh

      - name: 5. Upload Final Artifact (Optional)
        uses: actions/upload-artifact@v4
        with:
          name: Aiba-Browser-Debian
          # You may need to adjust this path depending on where your script outputs the final file
          path: chrome 
          retention-days: 3
